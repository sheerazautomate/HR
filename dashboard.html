<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Dashboard - Home</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css" rel="stylesheet"/>
  <link href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.bootstrap5.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --text-primary: #0f172a;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --border: #e2e8f0;
      --accent: #f97316;
      --accent-dark: #ea580c;
      --accent-light: #ffedd5;
      --success: #10b981;
      --danger: #ef4444;
      --purple: #8b5cf6;
      --teal: #14b8a6;
      --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
      --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
      --radius: 1rem;
      --radius-sm: 0.5rem;
    }

    body.dark {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-card: #1e293b;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #64748b;
      --border: #334155;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: all 0.3s ease;
    }

    /* Topbar */
    .topbar {
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      padding: 0 1.5rem;
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: var(--accent-light);
      border-radius: 2rem;
    }

    .role-badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      background: var(--accent);
      color: white;
    }

    .glass-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      transition: all 0.3s;
    }

    .quick-buttons {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .quick-btn {
      padding: 0.5rem 1rem;
      border-radius: 10px;
      font-size: 0.8rem;
      font-weight: 600;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .quick-btn-oot { background: var(--teal); color: white; }
    .quick-btn-ood { background: var(--purple); color: white; }
    .quick-btn-retirement { background: #f59e0b; color: white; }
    .quick-btn-resignation { background: #ef4444; color: white; }

    .hierarchy-select {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.6rem 0.8rem;
      font-size: 0.85rem;
      color: var(--text-primary);
      width: 100%;
    }

    .btn-modern {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: white;
      border: none;
      padding: 0.6rem 1.2rem;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }

    .action-btn {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      padding: 0.3rem 0.8rem;
      border-radius: 8px;
      font-size: 0.75rem;
      cursor: pointer;
    }

    .action-btn:hover {
      background: var(--accent);
      color: white;
    }

    .toast-container {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 9999;
    }

    .toast-custom {
      background: var(--bg-card);
      border-left: 4px solid var(--accent);
      border-radius: 12px;
      padding: 0.75rem 1rem;
      margin-top: 0.5rem;
      box-shadow: var(--shadow-lg);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* User Management Modal */
    .user-table {
      width: 100%;
      overflow-x: auto;
    }

    .user-table th, .user-table td {
      padding: 0.75rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .delete-user-btn {
      background: var(--danger);
      color: white;
      border: none;
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      cursor: pointer;
    }

    @media (max-width: 768px) {
      .topbar { padding: 0 1rem; height: 60px; }
      .quick-btn { padding: 0.4rem 0.8rem; font-size: 0.7rem; }
    }
  </style>
</head>
<body>

<div id="loadingOverlay" style="position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: center; justify-content: center;">
  <div class="glass-card" style="padding: 2rem; text-align: center;">
    <i class="fas fa-spinner fa-spin fa-3x" style="color: var(--accent);"></i>
    <p style="margin-top: 1rem;">Loading dashboard...</p>
  </div>
</div>

<header class="topbar">
  <div class="logo">
    <div class="logo-icon"><i class="fas fa-school"></i></div>
    <div>
      <h3 style="margin: 0; font-size: 1.1rem;">Staff Dashboard</h3>
      <p style="margin: 0; font-size: 0.7rem; color: var(--text-muted);">Punjab Education Department</p>
    </div>
  </div>
  <div class="user-info">
    <div class="user-badge">
      <i class="fas fa-user"></i>
      <span id="userName">Loading...</span>
      <span id="userRole" class="role-badge">Loading...</span>
    </div>
    <button id="adminPanelBtn" class="btn-modern" style="background: var(--purple); display: none;" onclick="openAdminPanel()">
      <i class="fas fa-users-cog"></i> Admin
    </button>
    <button class="theme-toggle" onclick="toggleTheme()" style="background: none; border: none; font-size: 1.2rem; cursor: pointer;">
      <i id="themeIcon" class="fas fa-moon"></i>
    </button>
    <button class="action-btn" onclick="logout()">
      <i class="fas fa-sign-out-alt"></i> Logout
    </button>
  </div>
</header>

<main style="padding: 1.5rem; max-width: 1600px; margin: 0 auto;">
  
  <div class="quick-buttons">
    <button class="quick-btn quick-btn-oot" onclick="showArchiveModal('OOT')">
      <i class="fas fa-exchange-alt"></i> OOT Archive
    </button>
    <button class="quick-btn quick-btn-ood" onclick="showArchiveModal('OOD')">
      <i class="fas fa-globe"></i> OOD Archive
    </button>
    <button class="quick-btn quick-btn-retirement" onclick="showArchiveModal('Retirement')">
      <i class="fas fa-user-check"></i> Retirement Archive
    </button>
    <button class="quick-btn quick-btn-resignation" onclick="showArchiveModal('Resignation')">
      <i class="fas fa-user-slash"></i> Resignation Archive
    </button>
  </div>

  <div class="glass-card" style="padding: 1.5rem; margin-bottom: 1.5rem;">
    <div style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">
      <i class="fas fa-layer-group" style="color: var(--accent);"></i>
      <span style="font-weight: 600;">Location Hierarchy</span>
    </div>
    <div class="row g-3">
      <div class="col-md-3">
        <label class="form-label" style="font-size: 0.7rem;">District</label>
        <select id="districtSelect" class="hierarchy-select" onchange="onDistrictChange()">
          <option value="all">All Districts</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label" style="font-size: 0.7rem;">Wing</label>
        <select id="wingSelect" class="hierarchy-select" onchange="onWingChange()" disabled>
          <option value="all">All Wings</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label" style="font-size: 0.7rem;">Tehsil</label>
        <select id="tehsilSelect" class="hierarchy-select" onchange="onTehsilChange()" disabled>
          <option value="all">All Tehsils</option>
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label" style="font-size: 0.7rem;">Markaz</label>
        <select id="markazSelect" class="hierarchy-select" onchange="onMarkazChange()" disabled>
          <option value="all">All Markaz</option>
        </select>
      </div>
    </div>
    <div style="margin-top: 1.5rem;">
      <button class="btn-modern" onclick="applyHierarchyFilter()">
        <i class="fas fa-search"></i> Show Staff
      </button>
      <span id="hierarchyScopeBadge" style="margin-left: 1rem; font-size: 0.75rem;"></span>
    </div>
  </div>

  <div id="resultsArea">
    <div class="glass-card" style="padding: 3rem; text-align: center;">
      <i class="fas fa-filter" style="font-size: 3rem; color: var(--text-muted);"></i>
      <p style="margin-top: 1rem;">Select filters and click "Show Staff"</p>
    </div>
  </div>

</main>

<div class="toast-container" id="toastContainer"></div>

<!-- Action Modal -->
<div class="modal fade" id="actionModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="fas fa-user-cog"></i> Teacher Action</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="teacherStrip" style="background: var(--accent-light); border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem;"></div>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 0.5rem; margin-bottom: 1.5rem;">
          <div class="action-pill" data-type="same" onclick="selectPill(this)" style="text-align: center; padding: 0.75rem; border: 1px solid var(--border); border-radius: 10px; cursor: pointer;">
            <i class="fas fa-school"></i>
            <div style="font-size: 0.7rem;">Within Tehsil</div>
          </div>
          <div class="action-pill" data-type="oot" onclick="selectPill(this)" style="text-align: center; padding: 0.75rem; border: 1px solid var(--border); border-radius: 10px; cursor: pointer;">
            <i class="fas fa-truck"></i>
            <div style="font-size: 0.7rem;">Out of Tehsil</div>
          </div>
          <div class="action-pill" data-type="ood" onclick="selectPill(this)" style="text-align: center; padding: 0.75rem; border: 1px solid var(--border); border-radius: 10px; cursor: pointer;">
            <i class="fas fa-plane"></i>
            <div style="font-size: 0.7rem;">Out of District</div>
          </div>
          <div class="action-pill" data-type="retirement" onclick="selectPill(this)" style="text-align: center; padding: 0.75rem; border: 1px solid var(--border); border-radius: 10px; cursor: pointer;">
            <i class="fas fa-medal"></i>
            <div style="font-size: 0.7rem;">Retirement</div>
          </div>
          <div class="action-pill" data-type="resignation" onclick="selectPill(this)" style="text-align: center; padding: 0.75rem; border: 1px solid var(--border); border-radius: 10px; cursor: pointer;">
            <i class="fas fa-file-signature"></i>
            <div style="font-size: 0.7rem;">Resignation</div>
          </div>
        </div>

        <div id="emisSection" style="display: none;">
          <label>New School EMIS Code</label>
          <div class="input-group">
            <input type="text" id="newEmisInput" class="form-control" placeholder="Enter EMIS Code">
            <button class="btn btn-outline-primary" onclick="verifySchool()">Verify</button>
          </div>
          <div id="schoolResult" class="mt-2" style="display: none;"></div>
        </div>

        <div id="notifSection" style="display: none;">
          <label>Notification No.</label>
          <input type="text" id="notifInput" class="form-control" placeholder="Enter Notification Number">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn-modern" id="confirmBtn" onclick="submitAction()" disabled>Confirm Action</button>
      </div>
    </div>
  </div>
</div>

<!-- Archive Modal -->
<div class="modal fade" id="archiveModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="archiveModalTitle">Archive View</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="archiveModalBody">Loading...</div>
    </div>
  </div>
</div>

<!-- Admin Panel Modal -->
<div class="modal fade" id="adminModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered modal-xl">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title"><i class="fas fa-users-cog"></i> User Management</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="adminModalBody"></div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>

<script>
// ══════════════════════════════════════════════════════════════
//  CONFIGURATION
// ══════════════════════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/YOUR_SCRIPT_ID/exec';
let authToken = null;
let currentUser = null;
let schoolsMap = {};
let staffDataCache = { headers: [], rows: [] };
let currentHierarchy = { district: 'all', wing: 'all', tehsil: 'all', markaz: 'all' };
let activeTeacher = null;
let activeType = null;
let verifiedSchoolData = null;
let currentDataTable = null;
let hierarchyData = null;

// ══════════════════════════════════════════════════════════════
//  AUTHENTICATION CHECK
// ══════════════════════════════════════════════════════════════
async function checkAuth() {
  authToken = localStorage.getItem('authToken');
  const userStr = localStorage.getItem('user');
  
  if (!authToken || !userStr) {
    window.location.href = 'login.html';
    return false;
  }
  
  try {
    currentUser = JSON.parse(userStr);
    document.getElementById('userName').textContent = currentUser.username;
    document.getElementById('userRole').textContent = currentUser.role.replace('_', ' ').toUpperCase();
    
    if (currentUser.role === 'super_admin') {
      document.getElementById('adminPanelBtn').style.display = 'block';
    }
    
    // Verify session with server
    const response = await fetch(`${GAS_URL}?action=verifySession&token=${encodeURIComponent(authToken)}`);
    const data = await response.json();
    
    if (!data.success) {
      throw new Error('Session expired');
    }
    
    return true;
  } catch (error) {
    console.error('Auth error:', error);
    localStorage.removeItem('authToken');
    localStorage.removeItem('user');
    window.location.href = 'login.html';
    return false;
  }
}

// ══════════════════════════════════════════════════════════════
//  INITIALIZATION
// ══════════════════════════════════════════════════════════════
async function initialize() {
  const isAuth = await checkAuth();
  if (!isAuth) return;
  
  document.getElementById('loadingOverlay').style.display = 'flex';
  
  try {
    await loadHierarchyLists();
    await loadSchoolsData();
    await loadStaffData();
    document.getElementById('loadingOverlay').style.display = 'none';
    showToast('Dashboard ready!', 'success');
  } catch (error) {
    console.error('Init error:', error);
    document.getElementById('loadingOverlay').style.display = 'none';
    showToast('Error loading data: ' + error.message, 'error');
  }
}

async function loadHierarchyLists() {
  const response = await fetch(`${GAS_URL}?action=getHierarchyLists&token=${encodeURIComponent(authToken)}`);
  const data = await response.json();
  
  if (data.success) {
    hierarchyData = data;
    populateDistrictDropdown(data.districts);
  }
}

function populateDistrictDropdown(districts) {
  const districtSelect = document.getElementById('districtSelect');
  districtSelect.innerHTML = '<option value="all">All Districts</option>';
  districts.forEach(d => {
    const opt = document.createElement('option');
    opt.value = opt.textContent = d;
    districtSelect.appendChild(opt);
  });
}

async function loadSchoolsData() {
  const response = await fetch(`${GAS_URL}?action=getAllSchools&token=${encodeURIComponent(authToken)}`);
  const data = await response.json();
  if (data.success) {
    buildSchoolsMap(data.data);
  }
}

function buildSchoolsMap(schools) {
  schoolsMap = {};
  schools.forEach(s => {
    if (s && s[0]) {
      schoolsMap[s[0].toString().trim()] = {
        name: s[1] || '', markaz: s[2] || '', tehsil: s[3] || '',
        district: s[4] || '', gender: s[5] || '', area: s[6] || '', wing: s[7] || ''
      };
    }
  });
}

async function loadStaffData() {
  const response = await fetch(`${GAS_URL}?action=getStaffData&token=${encodeURIComponent(authToken)}`);
  const data = await response.json();
  if (data.success) {
    staffDataCache = { headers: data.headers, rows: data.data };
  }
}

// ══════════════════════════════════════════════════════════════
//  HIERARCHY FUNCTIONS
// ══════════════════════════════════════════════════════════════
function onDistrictChange() {
  const district = document.getElementById('districtSelect').value;
  const wingSelect = document.getElementById('wingSelect');
  const tehsilSelect = document.getElementById('tehsilSelect');
  const markazSelect = document.getElementById('markazSelect');
  
  if (district === 'all') {
    wingSelect.innerHTML = '<option value="all">All Wings</option>';
    tehsilSelect.innerHTML = '<option value="all">All Tehsils</option>';
    markazSelect.innerHTML = '<option value="all">All Markaz</option>';
    wingSelect.disabled = true;
    tehsilSelect.disabled = true;
    markazSelect.disabled = true;
    return;
  }
  
  wingSelect.disabled = false;
  wingSelect.innerHTML = '<option value="all">All Wings</option>';
  const wings = hierarchyData.wingsByDistrict[district] || [];
  wings.forEach(w => {
    const opt = document.createElement('option');
    opt.value = opt.textContent = w;
    wingSelect.appendChild(opt);
  });
  
  tehsilSelect.innerHTML = '<option value="all">All Tehsils</option>';
  markazSelect.innerHTML = '<option value="all">All Markaz</option>';
  tehsilSelect.disabled = true;
  markazSelect.disabled = true;
}

function onWingChange() {
  const district = document.getElementById('districtSelect').value;
  const wing = document.getElementById('wingSelect').value;
  const tehsilSelect = document.getElementById('tehsilSelect');
  const markazSelect = document.getElementById('markazSelect');
  
  if (wing === 'all') {
    tehsilSelect.innerHTML = '<option value="all">All Tehsils</option>';
    markazSelect.innerHTML = '<option value="all">All Markaz</option>';
    tehsilSelect.disabled = true;
    markazSelect.disabled = true;
    return;
  }
  
  tehsilSelect.disabled = false;
  tehsilSelect.innerHTML = '<option value="all">All Tehsils</option>';
  const key = `${district}|${wing}`;
  const tehsils = hierarchyData.tehsilsByWing[key] || [];
  tehsils.forEach(t => {
    const opt = document.createElement('option');
    opt.value = opt.textContent = t;
    tehsilSelect.appendChild(opt);
  });
  
  markazSelect.innerHTML = '<option value="all">All Markaz</option>';
  markazSelect.disabled = true;
}

function onTehsilChange() {
  const district = document.getElementById('districtSelect').value;
  const wing = document.getElementById('wingSelect').value;
  const tehsil = document.getElementById('tehsilSelect').value;
  const markazSelect = document.getElementById('markazSelect');
  
  if (tehsil === 'all') {
    markazSelect.innerHTML = '<option value="all">All Markaz</option>';
    markazSelect.disabled = true;
    return;
  }
  
  markazSelect.disabled = false;
  markazSelect.innerHTML = '<option value="all">All Markaz</option>';
  const key = `${district}|${wing}|${tehsil}`;
  const markazList = hierarchyData.markazByTehsil[key] || [];
  markazList.forEach(m => {
    const opt = document.createElement('option');
    opt.value = opt.textContent = m;
    markazSelect.appendChild(opt);
  });
}

function onMarkazChange() {
  currentHierarchy.markaz = document.getElementById('markazSelect').value;
}

function applyHierarchyFilter() {
  currentHierarchy.district = document.getElementById('districtSelect').value;
  currentHierarchy.wing = document.getElementById('wingSelect').value;
  currentHierarchy.tehsil = document.getElementById('tehsilSelect').value;
  currentHierarchy.markaz = document.getElementById('markazSelect').value;
  
  filterStaffByHierarchy();
}

function filterStaffByHierarchy() {
  const filtered = staffDataCache.rows.filter(row => {
    const emis = row[1] ? row[1].toString().trim() : '';
    const school = schoolsMap[emis];
    if (!school) return false;
    
    if (currentHierarchy.district !== 'all' && school.district !== currentHierarchy.district) return false;
    if (currentHierarchy.wing !== 'all' && school.wing !== currentHierarchy.wing) return false;
    if (currentHierarchy.tehsil !== 'all' && school.tehsil !== currentHierarchy.tehsil) return false;
    if (currentHierarchy.markaz !== 'all' && school.markaz !== currentHierarchy.markaz) return false;
    return true;
  });
  
  renderTable(staffDataCache.headers, filtered);
  showToast(`Found ${filtered.length} teachers`, 'info');
}

// ══════════════════════════════════════════════════════════════
//  TABLE RENDER
// ══════════════════════════════════════════════════════════════
function renderTable(headers, rows) {
  if (currentDataTable) currentDataTable.destroy();
  if ($('#resultsTable').length) $('#resultsTable').remove();
  
  let html = `<div class="glass-card" style="padding: 1rem;">
    <div style="overflow-x: auto;">
      <table id="resultsTable" class="table table-hover" style="width: 100%;">
        <thead><tr>`;
  headers.forEach(h => html += `<th>${escapeHtml(String(h))}</th>`);
  html += `<th>Action</th></tr></thead><tbody>`;
  
  rows.forEach(row => {
    html += '<tr>';
    row.forEach(cell => html += `<td>${escapeHtml(cell == null ? '' : String(cell))}</td>`);
    html += `<td><button class="action-btn" onclick='openActionModal("${escapeAttr(row[0])}", "${escapeAttr(row[3])}", "${escapeAttr(row[6])}", "${escapeAttr(row[1])}")'><i class="fas fa-bolt"></i> Action</button></td>`;
    html += '</tr>';
  });
  
  html += '</tbody></table></div></div>';
  document.getElementById('resultsArea').innerHTML = html;
  
  currentDataTable = $('#resultsTable').DataTable({
    scrollX: true,
    dom: 'Bfrtip',
    buttons: [{ extend: 'excelHtml5', text: '<i class="fas fa-file-excel"></i> Export Excel', className: 'btn-modern' }],
    language: { search: '<i class="fas fa-search"></i> Quick Filter:' }
  });
}

// ══════════════════════════════════════════════════════════════
//  ACTION MODAL FUNCTIONS
// ══════════════════════════════════════════════════════════════
function openActionModal(pno, name, gender, emis) {
  activeType = null;
  verifiedSchoolData = null;
  
  const school = schoolsMap[emis] || {};
  activeTeacher = {
    pno: pno, name: name, gender: gender, emis: emis,
    currentTehsil: school.tehsil || '',
    currentDistrict: school.district || ''
  };
  
  document.getElementById('teacherStrip').innerHTML = `
    <div style="display: flex; align-items: center; gap: 1rem;">
      <div style="width: 50px; height: 50px; background: var(--accent); border-radius: 12px; display: flex; align-items: center; justify-content: center; color: white;">
        <i class="fas fa-user fa-2x"></i>
      </div>
      <div>
        <div style="font-weight: 700;">${escapeHtml(name)} (${gender === 'M' ? 'Male' : 'Female'})</div>
        <div style="font-size: 0.8rem;">Personal No: ${pno} | EMIS: ${emis}</div>
        <div style="font-size: 0.75rem;">Tehsil: ${school.tehsil || 'N/A'} | District: ${school.district || 'N/A'}</div>
      </div>
    </div>
  `;
  
  document.querySelectorAll('.action-pill').forEach(p => p.style.borderColor = 'var(--border)');
  document.getElementById('emisSection').style.display = 'none';
  document.getElementById('notifSection').style.display = 'none';
  document.getElementById('newEmisInput').value = '';
  document.getElementById('notifInput').value = '';
  document.getElementById('schoolResult').style.display = 'none';
  document.getElementById('confirmBtn').disabled = true;
  
  new bootstrap.Modal(document.getElementById('actionModal')).show();
}

function selectPill(el) {
  activeType = el.dataset.type;
  verifiedSchoolData = null;
  
  document.querySelectorAll('.action-pill').forEach(p => p.style.borderColor = 'var(--border)');
  el.style.borderColor = 'var(--accent)';
  
  const isTransfer = ['same', 'oot', 'ood'].includes(activeType);
  document.getElementById('emisSection').style.display = isTransfer ? 'block' : 'none';
  document.getElementById('notifSection').style.display = (!isTransfer && activeType) ? 'block' : 'none';
  document.getElementById('confirmBtn').disabled = isTransfer;
}

async function verifySchool() {
  const emis = document.getElementById('newEmisInput').value.trim();
  const school = schoolsMap[emis];
  const resultDiv = document.getElementById('schoolResult');
  
  if (!school) {
    resultDiv.innerHTML = '<div class="alert alert-danger">❌ EMIS not found</div>';
    resultDiv.style.display = 'block';
    return;
  }
  
  // Gender validation
  const teacherGender = activeTeacher.gender === 'M' ? 'male' : 'female';
  const schoolGender = school.gender.toLowerCase();
  
  if (teacherGender === 'male' && schoolGender === 'female') {
    resultDiv.innerHTML = '<div class="alert alert-danger">❌ Male teacher cannot be transferred to a Female school</div>';
    resultDiv.style.display = 'block';
    return;
  }
  
  if (teacherGender === 'female' && schoolGender === 'male') {
    resultDiv.innerHTML = '<div class="alert alert-danger">❌ Female teacher cannot be transferred to a Male school</div>';
    resultDiv.style.display = 'block';
    return;
  }
  
  // Transfer type validation
  const currentTehsil = activeTeacher.currentTehsil.toLowerCase().trim();
  const currentDistrict = activeTeacher.currentDistrict.toLowerCase().trim();
  const newTehsil = school.tehsil.toLowerCase().trim();
  const newDistrict = school.district.toLowerCase().trim();
  
  if (activeType === 'same' && currentTehsil !== newTehsil) {
    resultDiv.innerHTML = `<div class="alert alert-danger">❌ Within Tehsil transfer requires same tehsil.<br>Current: ${activeTeacher.currentTehsil}<br>New: ${school.tehsil}</div>`;
    resultDiv.style.display = 'block';
    return;
  }
  
  if (activeType === 'oot') {
    if (currentDistrict !== newDistrict) {
      resultDiv.innerHTML = `<div class="alert alert-danger">❌ Out of Tehsil transfer must stay in same district.<br>Current: ${activeTeacher.currentDistrict}<br>New: ${school.district}</div>`;
      resultDiv.style.display = 'block';
      return;
    }
    if (currentTehsil === newTehsil) {
      resultDiv.innerHTML = `<div class="alert alert-danger">❌ Out of Tehsil transfer requires a DIFFERENT tehsil.<br>Both are in: ${school.tehsil}</div>`;
      resultDiv.style.display = 'block';
      return;
    }
  }
  
  if (activeType === 'ood' && currentDistrict === newDistrict) {
    resultDiv.innerHTML = `<div class="alert alert-danger">❌ Out of District transfer requires a DIFFERENT district.<br>Current: ${activeTeacher.currentDistrict}</div>`;
    resultDiv.style.display = 'block';
    return;
  }
  
  verifiedSchoolData = { emis, name: school.name, markaz: school.markaz, tehsil: school.tehsil, district: school.district };
  
  resultDiv.innerHTML = `<div class="alert alert-success">✅ ${school.name}<br><small>Tehsil: ${school.tehsil} | District: ${school.district}</small></div>`;
  resultDiv.style.display = 'block';
  document.getElementById('confirmBtn').disabled = false;
}

async function submitAction() {
  const confirmBtn = document.getElementById('confirmBtn');
  confirmBtn.disabled = true;
  confirmBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';
  
  try {
    let payload = { action: null, token: authToken };
    
    if (['same', 'oot', 'ood'].includes(activeType)) {
      if (!verifiedSchoolData) throw new Error('Please verify school first');
      payload.action = 'transfer';
      payload.personalNo = activeTeacher.pno;
      payload.transferType = activeType;
      payload.newEmis = verifiedSchoolData.emis;
      payload.newMarkaz = verifiedSchoolData.markaz;
      payload.newSchoolName = verifiedSchoolData.name;
      payload.newTehsil = verifiedSchoolData.tehsil;
      payload.newDistrict = verifiedSchoolData.district;
    } else {
      const notifNo = document.getElementById('notifInput').value.trim();
      if (!notifNo) throw new Error('Please enter notification number');
      payload.action = 'retireOrResign';
      payload.personalNo = activeTeacher.pno;
      payload.actionType = activeType;
      payload.notificationNo = notifNo;
    }
    
    const response = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const result = await response.json();
    
    if (result.success) {
      showToast(result.message, 'success');
      bootstrap.Modal.getInstance(document.getElementById('actionModal')).hide();
      await loadStaffData();
      applyHierarchyFilter();
    } else {
      showToast(result.message || 'Action failed', 'error');
    }
  } catch (error) {
    showToast(error.message, 'error');
  } finally {
    confirmBtn.disabled = false;
    confirmBtn.innerHTML = 'Confirm Action';
  }
}

// ══════════════════════════════════════════════════════════════
//  ARCHIVE MODAL
// ══════════════════════════════════════════════════════════════
async function showArchiveModal(type) {
  document.getElementById('archiveModalTitle').innerHTML = `<i class="fas fa-archive"></i> ${type} Archive`;
  document.getElementById('archiveModalBody').innerHTML = '<div class="text-center p-5"><i class="fas fa-spinner fa-spin fa-2x"></i><p>Loading...</p></div>';
  
  const modal = new bootstrap.Modal(document.getElementById('archiveModal'));
  modal.show();
  
  const response = await fetch(`${GAS_URL}?action=getArchiveData&archiveType=${type}&token=${encodeURIComponent(authToken)}`);
  const data = await response.json();
  
  if (data.success && data.data && data.data.length > 0) {
    let html = `<div style="overflow-x: auto;"><table class="table" id="archiveTable"><thead><tr>`;
    if (data.headers) data.headers.forEach(h => html += `<th>${escapeHtml(String(h))}</th>`);
    html += `</tr></thead><tbody>`;
    data.data.forEach(row => {
      html += '<tr>';
      row.forEach(cell => html += `<td>${escapeHtml(cell == null ? '' : String(cell))}</td>`);
      html += '</tr>';
    });
    html += `</tbody></table></div>`;
    document.getElementById('archiveModalBody').innerHTML = html;
    $('#archiveTable').DataTable({ scrollX: true, dom: 'Bfrtip', buttons: [{ extend: 'excelHtml5', text: 'Export Excel' }] });
  } else {
    document.getElementById('archiveModalBody').innerHTML = '<div class="text-center p-5"><i class="fas fa-folder-open fa-3x"></i><p>No records found</p></div>';
  }
}

// ══════════════════════════════════════════════════════════════
//  ADMIN PANEL
// ══════════════════════════════════════════════════════════════
async function openAdminPanel() {
  document.getElementById('adminModalBody').innerHTML = '<div class="text-center p-5"><i class="fas fa-spinner fa-spin fa-2x"></i><p>Loading users...</p></div>';
  const modal = new bootstrap.Modal(document.getElementById('adminModal'));
  modal.show();
  
  const response = await fetch(`${GAS_URL}?action=getAllUsers&token=${encodeURIComponent(authToken)}`);
  const data = await response.json();
  
  if (data.success) {
    let html = `
      <div class="mb-4">
        <h6>Create New User</h6>
        <div class="row g-2">
          <div class="col-md-3"><input type="text" id="newUsername" class="form-control" placeholder="Username"></div>
          <div class="col-md-3"><input type="password" id="newPassword" class="form-control" placeholder="Password"></div>
          <div class="col-md-2">
            <select id="newRole" class="form-control">
              <option value="district">District</option>
              <option value="wing">Wing</option>
              <option value="tehsil">Tehsil</option>
              <option value="markaz">Markaz</option>
              <option value="viewer">Viewer</option>
            </select>
          </div>
          <div class="col-md-2"><input type="text" id="newDistrict" class="form-control" placeholder="District"></div>
          <div class="col-md-2"><button class="btn-modern" onclick="createUser()">Create User</button></div>
        </div>
      </div>
      <hr>
      <div class="user-table">
        <table class="table">
          <thead><tr><th>Username</th><th>Role</th><th>District</th><th>Wing</th><th>Tehsil</th><th>Markaz</th><th>Action</th></tr></thead>
          <tbody>
    `;
    data.data.forEach(user => {
      html += `<tr>
        <td>${escapeHtml(user.username)}</td>
        <td>${user.role}</td>
        <td>${user.district || '-'}</td>
        <td>${user.wing || '-'}</td>
        <td>${user.tehsil || '-'}</td>
        <td>${user.markaz || '-'}</td>
        <td><button class="delete-user-btn" onclick="deleteUser('${user.username}')"><i class="fas fa-trash"></i></button></td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
    document.getElementById('adminModalBody').innerHTML = html;
  }
}

async function createUser() {
  const username = document.getElementById('newUsername').value.trim();
  const password = document.getElementById('newPassword').value;
  const role = document.getElementById('newRole').value;
  const district = document.getElementById('newDistrict').value.trim();
  
  if (!username || !password) {
    showToast('Username and password required', 'error');
    return;
  }
  
  const response = await fetch(`${GAS_URL}?action=createUser&username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}&role=${role}&district=${encodeURIComponent(district)}&token=${encodeURIComponent(authToken)}`);
  const result = await response.json();
  
  if (result.success) {
    showToast('User created successfully', 'success');
    openAdminPanel();
  } else {
    showToast(result.message, 'error');
  }
}

async function deleteUser(username) {
  if (!confirm(`Delete user ${username}?`)) return;
  
  const response = await fetch(`${GAS_URL}?action=deleteUser&username=${encodeURIComponent(username)}&token=${encodeURIComponent(authToken)}`);
  const result = await response.json();
  
  if (result.success) {
    showToast('User deleted', 'success');
    openAdminPanel();
  } else {
    showToast(result.message, 'error');
  }
}

// ══════════════════════════════════════════════════════════════
//  UTILITY FUNCTIONS
// ══════════════════════════════════════════════════════════════
function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast-custom';
  const icon = type === 'success' ? 'check-circle' : (type === 'error' ? 'exclamation-circle' : 'info-circle');
  toast.innerHTML = `<i class="fas fa-${icon}"></i> ${message}`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function toggleTheme() {
  document.body.classList.toggle('dark');
  localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
  const icon = document.getElementById('themeIcon');
  icon.classList.toggle('fa-moon');
  icon.classList.toggle('fa-sun');
}

function logout() {
  fetch(`${GAS_URL}?action=logout&token=${encodeURIComponent(authToken)}`);
  localStorage.removeItem('authToken');
  localStorage.removeItem('user');
  window.location.href = 'login.html';
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
}

function escapeAttr(str) {
  return String(str).replace(/'/g, '&#39;').replace(/"/g, '&quot;');
}

// ══════════════════════════════════════════════════════════════
//  START
// ══════════════════════════════════════════════════════════════
const savedTheme = localStorage.getItem('theme');
if (savedTheme === 'dark') document.body.classList.add('dark');

initialize();
</script>
