<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Dashboard — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent:       #f97316;
      --accent-dark:  #ea580c;
      --accent-light: #ffedd5;
      --text-primary: #0f172a;
      --text-muted:   #94a3b8;
      --border:       #e2e8f0;
      --danger:       #ef4444;
      --shadow-lg:    0 10px 15px -3px rgb(0 0 0 / 0.1);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .login-container { width: 100%; max-width: 420px; }

    .login-card {
      background: white;
      border-radius: 2rem;
      padding: 2.5rem;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
      animation: fadeInUp 0.45s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo { text-align: center; margin-bottom: 2rem; }

    .logo-icon {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      border-radius: 1rem;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }
    .logo-icon i { font-size: 1.8rem; color: white; }
    .logo h2 { font-size: 1.5rem; font-weight: 700; color: var(--text-primary); }
    .logo p  { font-size: 0.85rem; color: var(--text-muted); margin-top: 0.25rem; }

    .form-group { margin-bottom: 1.25rem; }
    .form-group label {
      display: block; font-size: 0.78rem; font-weight: 600;
      margin-bottom: 0.4rem; color: #475569;
    }
    .input-wrapper { position: relative; }
    .input-wrapper i.icon-left {
      position: absolute; left: 0.9rem; top: 50%;
      transform: translateY(-50%); color: var(--text-muted); pointer-events: none;
    }
    .form-control {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.4rem;
      border: 1.5px solid var(--border);
      border-radius: 0.75rem;
      font-size: 0.9rem;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(249,115,22,0.12);
    }

    .btn-login {
      width: 100%;
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: white; border: none;
      padding: 0.8rem; border-radius: 0.75rem;
      font-size: 1rem; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-login:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }
    .btn-login:disabled { opacity: 0.65; cursor: not-allowed; }

    .error-box {
      background: #fee2e2; color: #dc2626;
      padding: 0.75rem 1rem; border-radius: 0.75rem;
      font-size: 0.85rem; margin-bottom: 1rem;
      display: none; align-items: center; gap: 0.5rem;
    }

    .demo-info {
      margin-top: 1.75rem; padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .demo-info p { font-size: 0.72rem; color: var(--text-muted); margin-bottom: 0.5rem; }
    .demo-badge {
      display: inline-block;
      background: var(--accent-light); color: var(--accent);
      padding: 0.2rem 0.65rem; border-radius: 20px;
      font-size: 0.68rem; font-weight: 600; margin: 0.2rem;
    }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-card">

    <div class="logo">
      <div class="logo-icon"><i class="fas fa-school"></i></div>
      <h2>Staff Dashboard</h2>
      <p>Punjab Education Department</p>
    </div>

    <div id="errorBox" class="error-box">
      <i class="fas fa-exclamation-circle"></i>
      <span id="errorText">Error</span>
    </div>

    <div class="form-group">
      <label>Username</label>
      <div class="input-wrapper">
        <i class="fas fa-user icon-left"></i>
        <input type="text" id="username" class="form-control"
               placeholder="Enter your username" autocomplete="username" required>
      </div>
    </div>

    <div class="form-group">
      <label>Password</label>
      <div class="input-wrapper">
        <i class="fas fa-lock icon-left"></i>
        <input type="password" id="password" class="form-control"
               placeholder="Enter your password" autocomplete="current-password" required>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="handleLogin()">
      <i class="fas fa-sign-in-alt"></i> Login
    </button>

    <div class="demo-info">
      <p>Demo Credentials</p>
      <span class="demo-badge">admin / admin123</span>
    </div>

  </div>
</div>

<script>
// ── IMPORTANT: Replace this with your deployed Web App URL ──────────────────
// In Google Apps Script: Extensions → Apps Script → Deploy → Manage Deployments
// Copy the "Web app URL" — it looks like:
//   https://script.google.com/macros/s/AKfycb.../exec
// ────────────────────────────────────────────────────────────────────────────
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwqxPxKOyQL_MUx9BA70SOcdObhuCXBqU9hKdrMRBh_JJgJUKgE_Pz_2yJtWSrnQZFQ/exec';

// If already logged in, skip to dashboard
(function checkExisting() {
  const token = localStorage.getItem('authToken');
  if (token) window.location.href = 'index.html';
})();

// Allow Enter key to submit
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleLogin();
});

async function handleLogin() {
  const username = (document.getElementById('username').value || '').trim();
  const password =  document.getElementById('password').value || '';
  const loginBtn = document.getElementById('loginBtn');

  if (!username || !password) {
    showError('Please enter both username and password.');
    return;
  }

  loginBtn.disabled = true;
  loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in…';
  hideError();

  try {
    // NOTE: Credentials are sent as URL params over HTTPS (encrypted in transit).
    // Google Apps Script doPost is not supported for unauthenticated web apps
    // without CORS pre-flight issues, so GET is used here. Always deploy over HTTPS.
    const url = `${GAS_URL}?action=authenticate`
      + `&username=${encodeURIComponent(username)}`
      + `&password=${encodeURIComponent(password)}`;

    const response = await fetch(url, { redirect: 'follow' });

    if (!response.ok) {
      throw new Error(`Network response was not ok (${response.status})`);
    }

    const data = await response.json();

    if (data.success) {
      localStorage.setItem('authToken', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      window.location.href = 'index.html';
    } else {
      showError(data.message || 'Invalid username or password.');
      loginBtn.disabled = false;
      loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
    }
  } catch (err) {
    console.error('Login error:', err);
    showError('Network error — please check your connection and try again.');
    loginBtn.disabled = false;
    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
  }
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  document.getElementById('errorText').textContent = msg;
  box.style.display = 'flex';
}

function hideError() {
  document.getElementById('errorBox').style.display = 'none';
}
</script>

</body>
</html>
